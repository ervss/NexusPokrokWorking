<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Discovered Videos - Nexus Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/theme.css?v=nx_v1">
    <link rel="stylesheet" href="/static/app_shell.css?v=nx_v1">
    <script src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    <script src="/static/app_shell.js?v=nx_v1" defer></script>
    <style>
        .review-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            color: var(--accent-color, #a855f7);
        }

        .stats-bar {
            display: flex;
            gap: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-color, #a855f7);
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s;
            position: relative;
        }

        .video-card.selected {
            border-color: var(--accent-color, #a855f7);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .video-card.imported {
            opacity: 0.6;
            border-color: #22c55e;
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #1a1a2e;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: white;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .checkbox-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .checkbox-overlay input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .imported-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #22c55e;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .source-badge {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent-color, #a855f7);
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-color, #a855f7);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="nx-page">
    <div class="review-container" x-data="reviewApp({{ profile_id }})">
        <a href="/discovery" class="back-link">← Back to Discovery Profiles</a>

        <div class="header">
            <div>
                <h1 x-text="profileName">Review Discovered Videos</h1>
                <p style="color: rgba(255,255,255,0.6); margin-top: 5px;" x-text="`Profile ID: ${profileId}`"></p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button @click="startSwipeReview()" class="btn btn-primary" title="Swipe review mode">Swipe review</button>
                <button @click="clearImported()" class="btn btn-secondary">Clear Imported</button>
                <button @click="location.href='/discovery'" class="btn btn-secondary">Close</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" x-text="videos.length"></div>
                <div class="stat-label">Total Found</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" x-text="notImportedCount"></div>
                <div class="stat-label">Not Imported</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" x-text="selectedCount"></div>
                <div class="stat-label">Selected</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" x-text="importedCount"></div>
                <div class="stat-label">Already Imported</div>
            </div>
        </div>

        <div class="controls-bar">
            <div>
                <label style="margin-right: 10px;">
                    <input type="checkbox" @change="toggleSelectAll()" :checked="allSelected"> Select All
                </label>
                <label>
                    <input type="checkbox" x-model="hideImported"> Hide Imported
                </label>
            </div>
            <button @click="importSelected()" class="btn btn-primary" :disabled="selectedCount === 0">
                Import Selected (<span x-text="selectedCount"></span>)
            </button>
        </div>

        <div class="videos-grid" x-show="filteredVideos.length > 0">
            <template x-for="video in filteredVideos" :key="video.id">
                <div class="video-card" :class="{ 'selected': selectedVideos.includes(video.id), 'imported': video.imported }">
                    <div class="checkbox-overlay" x-show="!video.imported" @click="toggleSelect(video.id)">
                        <input type="checkbox" :checked="selectedVideos.includes(video.id)" @click.stop="toggleSelect(video.id)">
                    </div>

                    <div class="imported-badge" x-show="video.imported">Imported</div>

                    <img :src="video.thumbnail || '/static/placeholder.jpg'"
                         class="video-thumbnail"
                         :alt="video.title"
                         @error="$event.target.src='/static/placeholder.jpg'">

                    <div class="video-info">
                        <div class="video-title" x-text="video.title"></div>
                        <div class="video-meta">
                            <span x-text="formatDuration(video.duration)"></span>
                            <span x-text="video.width && video.height ? `${video.height}p` : 'Unknown'"></span>
                        </div>
                        <div style="margin-bottom: 8px;">
                            <span class="source-badge" x-text="video.source"></span>
                        </div>
                        <div style="font-size: 0.75rem; color: rgba(255,255,255,0.5);">
                            <span x-text="new Date(video.discovered_at).toLocaleDateString()"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="empty-state" x-show="filteredVideos.length === 0">
            <h2>No videos to review</h2>
            <p>All discovered videos have been imported or no matches found yet.</p>
        </div>
    </div>

    <script>
        function reviewApp(profileId) {
            return {
                profileId: profileId,
                profileName: '',
                videos: [],
                selectedVideos: [],
                hideImported: true,

                init() {
                    this.loadVideos();
                },

                async loadVideos() {
                    const response = await fetch(`/api/v1/discovery/review/${this.profileId}`);
                    const data = await response.json();
                    this.videos = data.discovered_videos;

                    if (this.videos.length > 0) {
                        this.profileName = this.videos[0].profile_name;
                    }
                },

                get filteredVideos() {
                    if (this.hideImported) {
                        return this.videos.filter(v => !v.imported);
                    }
                    return this.videos;
                },

                get notImportedCount() {
                    return this.videos.filter(v => !v.imported).length;
                },

                get importedCount() {
                    return this.videos.filter(v => v.imported).length;
                },

                get selectedCount() {
                    return this.selectedVideos.length;
                },

                get allSelected() {
                    const notImported = this.videos.filter(v => !v.imported);
                    return notImported.length > 0 && this.selectedVideos.length === notImported.length;
                },

                toggleSelect(videoId) {
                    const index = this.selectedVideos.indexOf(videoId);
                    if (index > -1) {
                        this.selectedVideos.splice(index, 1);
                    } else {
                        this.selectedVideos.push(videoId);
                    }
                },

                toggleSelectAll() {
                    const notImported = this.videos.filter(v => !v.imported);
                    if (this.allSelected) {
                        this.selectedVideos = [];
                    } else {
                        this.selectedVideos = notImported.map(v => v.id);
                    }
                },

                async importSelected() {
                    if (this.selectedCount === 0) return;

                    const response = await fetch('/api/v1/discovery/import-selected', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.selectedVideos)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        alert(`Successfully imported ${data.imported_count} videos!`);

                        // Mark as imported in local state
                        this.videos.forEach(v => {
                            if (this.selectedVideos.includes(v.id)) {
                                v.imported = true;
                                v.imported_at = new Date().toISOString();
                            }
                        });

                        this.selectedVideos = [];
                    }
                },

                async clearImported() {
                    if (!confirm('Remove all imported videos from this review list?')) return;

                    const response = await fetch(`/api/v1/discovery/clear-imported/${this.profileId}`, {
                        method: 'POST'
                    });

                    if (response.ok) {
                        this.loadVideos();
                    }
                },

                formatDuration(seconds) {
                    if (!seconds) return 'Unknown';
                    const mins = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return `${mins}:${secs.toString().padStart(2, '0')}`;
                },

                startSwipeReview() {
                    if (!window.NXShell || !window.NXShell.swipe) {
                        alert('Swipe review is still loading — try again in a second.');
                        return;
                    }
                    const items = this.videos
                        .filter(v => !v.imported)
                        .map(v => ({
                            id: v.id,
                            title: v.title,
                            thumbnail: v.thumbnail,
                            source: v.source,
                            source_url: v.source_url || v.url,
                            duration_display: this.formatDuration(v.duration),
                        }));
                    if (!items.length) {
                        alert('Nothing to review.');
                        return;
                    }
                    const approved = [];
                    window.NXShell.swipe.open(items, async (item, kind) => {
                        if (kind === 'approve') approved.push(item.id);
                        // On the last item, submit the batch
                        const remaining = items.length - (approved.length + 0);
                        if (item === items[items.length - 1] && approved.length) {
                            try {
                                const res = await fetch('/api/v1/discovery/import-selected', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(approved),
                                });
                                if (res.ok) {
                                    const data = await res.json();
                                    this.videos.forEach(v => {
                                        if (approved.includes(v.id)) {
                                            v.imported = true;
                                            v.imported_at = new Date().toISOString();
                                        }
                                    });
                                    setTimeout(() => window.NXShell.swipe.close(), 1200);
                                }
                            } catch (e) {}
                        }
                    });
                }
            };
        }
    </script>
</body>
</html>
