<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Future · Statistics</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/theme.css?v=nx_v1">
    <link rel="stylesheet" href="/static/app_shell.css?v=nx_v1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/static/app_shell.js?v=nx_v1" defer></script>
    <style>
        body.nx-stats {
            background: var(--nx-bg-0);
            color: var(--nx-text);
            min-height: 100vh;
            overflow-y: auto;
            padding: 40px 20px 120px;
        }

        .nx-stats-shell {
            max-width: 1080px;
            margin: 0 auto;
        }

        .nx-stats-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 20px 0 32px;
            border-bottom: 1px solid var(--nx-border);
            margin-bottom: 36px;
        }

        .nx-stats-eyebrow {
            font-family: var(--nx-font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--nx-accent);
            margin-bottom: 6px;
        }

        .nx-stats-title {
            font-family: var(--nx-font-display);
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0;
        }

        .nx-stats-back {
            font-family: var(--nx-font-mono);
            font-size: 12px;
            color: var(--nx-text-dim);
            text-decoration: none;
            border: 1px solid var(--nx-border-strong);
            padding: 10px 16px;
            border-radius: var(--nx-r-pill);
            transition: all var(--nx-motion-fast) var(--nx-ease);
        }

        .nx-stats-back:hover {
            color: var(--nx-accent);
            border-color: var(--nx-accent);
        }

        .nx-chart-card {
            background: linear-gradient(180deg, var(--nx-bg-1), var(--nx-bg-2));
            border: 1px solid var(--nx-border);
            border-radius: var(--nx-r-lg);
            padding: 28px 32px 36px;
            margin-bottom: 28px;
            box-shadow: var(--nx-shadow-sm);
        }

        .nx-chart-card h2 {
            margin: 0 0 4px;
            font-family: var(--nx-font-display);
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.015em;
        }

        .nx-chart-card .nx-stats-eyebrow {
            margin-bottom: 18px;
        }

        .nx-chart-wrap {
            position: relative;
            height: clamp(260px, 40vh, 380px);
        }
    </style>
</head>
<body class="nx-stats">
    <div class="nx-stats-shell">
        <header class="nx-stats-head">
            <div>
                <div class="nx-stats-eyebrow">Library insights</div>
                <h1 class="nx-stats-title">Statistics</h1>
            </div>
            <a href="/" class="nx-stats-back">← Back to vault</a>
        </header>

        <section class="nx-chart-card">
            <div class="nx-stats-eyebrow">01 · Batches</div>
            <h2>Videos per batch</h2>
            <div class="nx-chart-wrap"><canvas id="batchChart"></canvas></div>
        </section>

        <section class="nx-chart-card">
            <div class="nx-stats-eyebrow">02 · Tags</div>
            <h2>Top 20 tags</h2>
            <div class="nx-chart-wrap"><canvas id="tagsChart"></canvas></div>
        </section>

        <section class="nx-chart-card">
            <div class="nx-stats-eyebrow">03 · Quality</div>
            <h2>Videos by quality</h2>
            <div class="nx-chart-wrap"><canvas id="qualityChart"></canvas></div>
        </section>
    </div>

    <script src="/static/stats.js" defer></script>
</body>
</html>
